<!--
  LanOnasis SEO Meta Template
  Copy into your <head> and replace all {{PLACEHOLDERS}}

  CHECKLIST:
    [ ] Title: 50-60 chars, includes primary keyword
    [ ] Description: 150-160 chars, action-oriented
    [ ] og:image: 1200×630px minimum, absolute URL
    [ ] canonical: matches the URL users see (no trailing slash inconsistency)
    [ ] Replace {{DOMAIN}} throughout (no trailing slash)
    [ ] Replace {{PAGE_PATH}} with path relative to domain (e.g. /features)
    [ ] Set correct og:type — "website" for homepages, "article" for blog posts
-->

<!-- ================================================ -->
<!-- PRIMARY META                                     -->
<!-- ================================================ -->
<title>{{PAGE_TITLE}} | Lan Onasis</title>
<meta name="description" content="{{PAGE_DESCRIPTION_150_160_CHARS}}">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{DOMAIN}}{{PAGE_PATH}}">

<!-- ================================================ -->
<!-- OPEN GRAPH (Facebook, LinkedIn, WhatsApp, Slack) -->
<!-- ================================================ -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Lan Onasis">
<meta property="og:title" content="{{PAGE_TITLE}} | Lan Onasis">
<meta property="og:description" content="{{PAGE_DESCRIPTION_150_160_CHARS}}">
<meta property="og:url" content="{{DOMAIN}}{{PAGE_PATH}}">
<meta property="og:image" content="{{DOMAIN}}/og/{{OG_IMAGE_FILENAME}}.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="{{OG_IMAGE_ALT_TEXT}}">
<meta property="og:locale" content="en_US">

<!-- ================================================ -->
<!-- TWITTER CARD                                     -->
<!-- ================================================ -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@lanonasis">
<meta name="twitter:creator" content="@lanonasis">
<meta name="twitter:title" content="{{PAGE_TITLE}} | Lan Onasis">
<meta name="twitter:description" content="{{PAGE_DESCRIPTION_150_160_CHARS}}">
<meta name="twitter:image" content="{{DOMAIN}}/og/{{OG_IMAGE_FILENAME}}.png">
<meta name="twitter:image:alt" content="{{OG_IMAGE_ALT_TEXT}}">

<!-- ================================================ -->
<!-- JSON-LD STRUCTURED DATA                         -->
<!-- Choose the schema type that matches the page.   -->
<!-- ================================================ -->

<!-- OPTION A: Organization (homepage / about) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Lan Onasis",
  "url": "{{DOMAIN}}",
  "logo": "{{DOMAIN}}/logo.png",
  "description": "{{PAGE_DESCRIPTION_150_160_CHARS}}",
  "sameAs": [
    "https://twitter.com/lanonasis",
    "https://linkedin.com/company/lanonasis",
    "https://github.com/lanonasis"
  ]
}
</script>
